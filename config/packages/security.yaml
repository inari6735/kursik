security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        # Password login loads the entity (explicit loader in FormLoginAuthenticator).
        app_users:
            entity:
                class: App\User\Domain\User
                property: email
        # JWT requests build the user from token claims — no database query.
        jwt_users:
            lexik_jwt:
                class: App\Access\Infrastructure\Security\TokenUser

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            # The whole app authenticates via JWT in an HttpOnly cookie — no sessions.
            stateless: true
            provider: jwt_users
            custom_authenticators:
                - App\User\Infrastructure\Security\FormLoginAuthenticator
            # Lexik: verifies the JWT extracted from the AUTH_TOKEN cookie.
            jwt: ~
            login_throttling: ~
            entry_point: App\User\Infrastructure\Security\FormLoginAuthenticator
            logout:
                path: /logout
                enable_csrf: true

    # Note: Only the *first* matching rule is applied.
    # Course mutations are guarded by PermissionVoter in the controllers
    # (denyAccessUnlessGranted('course.*')) — not by path rules.
    access_control:
        - { path: ^/(login|register)$, roles: PUBLIC_ACCESS }
        - { path: ^/logout$, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon