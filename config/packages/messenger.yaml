framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
            failed: 'doctrine://default?queue_name=failed'
            sync: 'sync://'

        default_bus: messenger.bus.default

        buses:
            messenger.bus.default: []
            messenger.bus.command:
                middleware:
                    - validation
                    - doctrine_transaction
            messenger.bus.query:
                middleware:
                    - validation
            messenger.bus.event:
                default_middleware:
                    enabled: true
                    allow_no_handlers: true

        routing:
            Symfony\Component\Mailer\Messenger\SendEmailMessage: async
            Symfony\Component\Notifier\Message\ChatMessage: async
            Symfony\Component\Notifier\Message\SmsMessage: async

            App\Shared\Application\Transport\AsyncTransport: async
            App\Shared\Application\Transport\SyncTransport: sync

            # Domain events fan out to both transports: the sync one runs critical
            # projectors in the command transaction, the async one feeds the worker.
            # Projectors pick their side via AsMessageHandler(fromTransport: ...).
            App\Shared\Domain\DomainEvent: [sync, async]
