# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\Shared\Application\Bus\CommandBus: '@App\Shared\Infrastructure\MessengerCommandBus'
    App\Shared\Application\Bus\QueryBus: '@App\Shared\Infrastructure\MessengerQueryBus'

    App\Shared\Infrastructure\MessengerCommandBus:
        arguments:
            $commandBus: '@messenger.bus.command'

    App\Shared\Infrastructure\MessengerQueryBus:
        arguments:
            $queryBus: '@messenger.bus.query'


    # No event-sourced contexts at the moment — register event classes here
    # when a context starts using the event store again.
    App\Shared\Infrastructure\EventStore\EventTypeRegistry: ~

    App\Shared\Infrastructure\EventStore\NoOpUpcaster: ~
    App\Shared\Infrastructure\EventStore\Upcaster: '@App\Shared\Infrastructure\EventStore\NoOpUpcaster'

    App\Shared\Infrastructure\EventStore\DbalEventStore: ~
    App\Shared\Infrastructure\EventStore\EventStore: '@App\Shared\Infrastructure\EventStore\DbalEventStore'

    App\Shared\Infrastructure\SystemClock: ~
    App\Shared\Domain\Clock: '@App\Shared\Infrastructure\SystemClock'

    # Course module: Domain holds the ORM entity and value objects (not services).
    App\Course\:
        resource: '../src/Course/'
        exclude: '../src/Course/Domain/'

    App\Course\Domain\CourseRepository: '@App\Course\Infrastructure\DoctrineCourseRepository'

    App\Course\Application\Query\CourseReadModel: '@App\Course\Infrastructure\ReadModel\CourseReadModelRepository'

    # User module: Domain holds the ORM entity (not a service); RefreshToken is
    # an entity too, so it stays out of the container as well.
    App\User\:
        resource: '../src/User/'
        exclude:
            - '../src/User/Domain/'
            - '../src/User/Infrastructure/Security/RefreshToken.php'

    App\User\Domain\UserRepository: '@App\User\Infrastructure\DoctrineUserRepository'

    # Access module: Domain holds the Role entity and Permission enum (not services).
    App\Access\:
        resource: '../src/Access/'
        exclude:
            - '../src/Access/Domain/'

    App\Access\Domain\RoleRepository: '@App\Access\Infrastructure\DoctrineRoleRepository'
    App\Access\Application\UserRoleAssignments: '@App\Access\Infrastructure\DbalUserRoleAssignments'
    App\Access\Application\Query\AccessReadModel: '@App\Access\Infrastructure\ReadModel\DbalAccessReadModel'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
